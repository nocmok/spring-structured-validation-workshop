openapi: 3.0.3
info:
  title: Structured Validation Demo API
  version: "1.0"

paths:
  /product/calculate:
    post:
      tags:
        - product
      operationId: calculate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculateRequest"
      responses:
        "200":
          description: Calculation successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalculateResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    CalculateRequest:
      type: object
      required:
        - risks
        - insurant
      properties:
        risks:
          type: array
          minItems: 1
          maxItems: 10
          items:
            $ref: "#/components/schemas/Risk"
        insurant:
          $ref: "#/components/schemas/Insurant"

    CalculateResponse:
      type: object
      required:
        - premium
      properties:
        premium:
          type: number

    Insurant:
      type: object
      required:
        - name
        - email
      properties:
        name:
          $ref: "#/components/schemas/Name"
        email:
          $ref: "#/components/schemas/Email"

    Name:
      type: string
      pattern: '^(?!\s*$).+'
      minLength: 1
      maxLength: 100

    Email:
      type: string
      format: email
      minLength: 1
      maxLength: 100

    Risk:
      type: object
      required:
        - id
        - insuranceType
      properties:
        id:
          type: string
          format: uuid
        insuranceType:
          $ref: "#/components/schemas/InsuranceType"

    InsuranceType:
      type: string
      enum:
        - "LIFE"
        - "PROPERTY"
        - "LIABILITY"

    Error:
      type: object
      required:
        - code
        - details
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
          nullable: true
        details:
          type: array
          items:
            $ref: "#/components/schemas/ErrorDetail"

    ErrorDetail:
      type: object
      required:
        - field
      properties:
        field:
          type: string
        message:
          type: string
          nullable: true

    ErrorCode:
      type: string
      enum:
        - VALIDATION_ERROR
        - INTERNAL_ERROR
